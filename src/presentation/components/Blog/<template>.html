<script setup lang="ts">
import { ref, computed } from 'vue';
import { useRouter } from 'vue-router';

// Props recebidas do componente pai (ex: PageHomeBlog.vue)
const props = defineProps<{
  postagens?: any[];               // Lista de postagens (já carregada)
  categorias?: any[];              // Lista de categorias com contagem
  postsRecentes?: any[];           // Lista de posts recentes
  tags?: any[];                     // Lista de tags
  totalPaginas?: number;            // Total de páginas
  paginaAtual?: number;             // Página atual
  loadingPostagem?: boolean;
  errorPostagem?: string;
  title?: string;                   // Título customizado (ex: quando filtrado)
  isSinglePost?: boolean;           // Se true, exibe conteúdo completo (para rota de post único)
}>();

// Emits
const emit = defineEmits<{
  (e: 'search', query: string): void;
  (e: 'change-page', page: number): void;
  (e: 'subscribe', email: string): void;
}>();

// Dados locais
const searchQuery = ref('');
const newsletterEmail = ref('');

// Formatação de data
function formatDate(dateStr: string | undefined): string {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

// Truncar texto
function truncate(text: string, length: number): string {
  if (text.length <= length) return text;
  return text.substring(0, length) + '...';
}

// Manipuladores
function handleSearch() {
  if (searchQuery.value.trim()) {
    emit('search', searchQuery.value.trim());
  }
}

function changePage(page: number) {
  if (page >= 1 && page <= (props.totalPaginas || 1)) {
    emit('change-page', page);
  }
}

function subscribeNewsletter() {
  if (newsletterEmail.value.trim()) {
    emit('subscribe', newsletterEmail.value.trim());
    newsletterEmail.value = '';
  }
}
</script>
